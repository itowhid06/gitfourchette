name: Deb Package

on: [workflow_dispatch]

env:
  PYVER: "3.14"
  QT_API: "pyqt6"

jobs:
  deb:
    runs-on: ubuntu-22.04  # oldest available for maximum glibc compatibility
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "${{ env.PYVER }}" }
      - run: python --version
      - run: python -m pip install --upgrade pip setuptools wheel
      - run: python -m pip install --upgrade -e .[$QT_API,pygments,mfusepy]  # install dependencies (installing GF itself isn't necessary)
      - run: python .github/workflows/artifactname.py >> $GITHUB_ENV
      - run: python -m pip install --upgrade pyinstaller
      - run: python -m PyInstaller pkg/pyinstaller/gitfourchette.spec
      - name: Install fpm
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential
          sudo gem install fpm
      - name: Build deb package
        run: |
          APPVER=$(python3 -c 'from gitfourchette.appconsts import APP_VERSION; print(APP_VERSION)')
          DEB_NAME="gitfourchette-${APPVER}-amd64.deb"

          # Prepare staging directory layout
          mkdir -p staging/opt/gitfourchette
          mkdir -p staging/usr/bin
          mkdir -p staging/usr/share/applications
          mkdir -p staging/usr/share/pixmaps

          # Copy frozen bundle
          cp -r dist/GitFourchette/. staging/opt/gitfourchette/

          # Launcher wrapper
          cat > staging/usr/bin/gitfourchette << 'EOF'
          #!/bin/sh
          exec /opt/gitfourchette/GitFourchette "$@"
          EOF
          chmod +x staging/usr/bin/gitfourchette

          # Desktop entry (override Exec to use the frozen binary, not python3 -m)
          sed 's|^Exec=.*|Exec=/usr/bin/gitfourchette %F|' \
            pkg/gitfourchette.desktop \
            > staging/usr/share/applications/gitfourchette.desktop
          cp gitfourchette/assets/icons/gitfourchette.png staging/usr/share/pixmaps/gitfourchette.png

          mkdir -p build
          fpm \
            --input-type dir \
            --output-type deb \
            --name gitfourchette \
            --version "$APPVER" \
            --architecture amd64 \
            --description "The comfortable Git UI" \
            --url "https://gitfourchette.org" \
            --license "GPL-3.0" \
            --maintainer "Iliyas Jorio" \
            --category "devel" \
            --package "build/$DEB_NAME" \
            --chdir staging \
            .

          echo "ARTIFACT_NAME=$DEB_NAME" >> $GITHUB_ENV
      - uses: actions/upload-artifact@v6
        with:
          path: build/*.deb
          name: ${{env.ARTIFACT_NAME}}
          compression-level: 0
